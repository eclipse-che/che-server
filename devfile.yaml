schemaVersion: 2.3.0
metadata:
  name: che-server
  generateName: che-server-
components:
  - container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 12G
      memoryRequest: 512Mi
      cpuRequest: 1000m
      cpuLimit: 5000m
      mountSources: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
    name: tools
  - name: m2
    volume: {}
commands:
  - id: build-sources
    exec:
      label: "1. Build sources"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        mvn clean install -V -e -Pfast -DskipTests -Dskip-validate-sources -Denforcer.skip=true
      group:
        kind: build
        isDefault: true
  - id: build-image
    exec:
      label: "2. Build image"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        ./build/build.sh
      group:
        kind: build
        isDefault: true
  - id: install-chectl
    exec:
      label: "3. Install chectl"
      component: tools
      group:
        kind: build
      workingDir: ${HOME}
      commandLine: >
        curl -LJO $(curl -fsSL https://che-incubator.github.io/chectl/download-link/stable-linux-x64)
        && tar -xf chectl-linux-x64.tar.gz -C $HOME/
        && echo 'export PATH=$HOME/chectl/bin/:$PATH' >> $HOME/.bashrc
